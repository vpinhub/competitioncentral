name: Rebuild list.json

on:
  workflow_run:
    workflows:
      - "Save Thursday Throwdown Results"
      - "Save Special When Lit Results"
    types:
      - completed
  workflow_dispatch:   # allow manual trigger any time list.json is out of sync

jobs:
  update-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Pull the latest commit so we see files just pushed by the save workflows
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Rebuild list.json from json/ folder
        run: python scripts/update_list.py

      - name: Commit updated list.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add json/list.json
          git diff --cached --quiet && echo "list.json already up to date" || \
            git commit -m "auto: rebuild list.json $(date -u +%Y-%m-%d)"
          git push
